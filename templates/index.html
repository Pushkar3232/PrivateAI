<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Private AI</title>
    <link rel="stylesheet" href="./static/css/main.css">
    <link rel="icon" href="./static/x1.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
      .right2{
        display: none;
      }
    </style>
    
    
    
</head>
<body class="bg-chatblack-50">
    <div class="flex h-[100vh] text-white">
        <div class="left bg-gray-950 w-2/12 rounded-e-3xl">
            <div class="flex w-[90%] mx-6 my-6  ">
                <button class=" p-2 border-white border rounded-md px-16 justify-center items-center hover:bg-gray-800">
                    New Chat
                </button>
            </div>

            <div class="chats flex flex-col justify-center items-center">
              <div class="my-2 chat opacity-80 m-1 p-2 rounded-md bg-gray-800 cursor-pointer flex justify-start items-center w-[86%] hover:bg-white hover:text-slate-950">
                
                <span>
                  clone AI 
                </span>
              </div>
              <div class="my-1  chat opacity-80 m-1 p-2 rounded-md bg-gray-800 cursor-pointer flex justify-start items-center w-[86%] hover:bg-white hover:text-slate-950">
                
                <span>
                  Jarvis AI
                </span>
              </div>
            </div>
            
                 
        </div>
        <div class="right1 w-10/12 flex justify-center items-center flex-col">
            <div class="text-center  w-full text-5xl font-bold my-10">

                OneX AI
                
            </div>
            <div class="items_row flex">

                <div class="relative w-full flex gap-2 snap-x snap-mandatory overflow-x-auto py-4 px-6 text-2xl">
                    <div class="example flex flex-col justify-center items-center text-blue-200 text-3xl">
                      How can I help you today?
                      <p> <br></p>
                  
                      <div class="flex gap-2">
                        <button class="flex flex-col flex-1 shrink-0 w-64 justify-between h-36 p-4 px-6 bg-gray-950 hover:bg-gray-800 rounded-3xl transition group snap-center">
                          <div class="flex flex-col text-left">
                            <div class=" text-xl font-medium text-gray-300 group-hover:text-gray-200 transition">Tell me a fun fact</div>
                            <div class="text-sm text-gray-400 font-medium line-clamp-2">about the Roman Empire</div>
                          </div>
                          <div class="w-full flex justify-between">
                            <div class="text-xs text-gray-500 group-hover:text-gray-400 transition self-center">Prompt</div>
                            <div class="self-end p-1 rounded-lg text-gray-400 group-hover:text-gray-200 transition">
                              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="size-4">
                                <path fill-rule="evenodd" d="M8 14a.75.75 0 0 1-.75-.75V4.56L4.03 7.78a.75.75 0 0 1-1.06-1.06l4.5-4.5a.75.75 0 0 1 1.06 0l4.5 4.5a.75.75 0 0 1-1.06 1.06L8.75 4.56v8.69A.75.75 0 0 1 8 14Z" clip-rule="evenodd"></path>
                              </svg>
                            </div>
                          </div>
                        </button>
                  
                        <button class="flex flex-col flex-1 shrink-0 w-64 justify-between h-36 p-4 px-6 bg-gray-950 hover:bg-gray-800 rounded-3xl transition group snap-center">
                          <div class="flex flex-col text-left">
                            <div class="text-xl font-medium text-gray-300 group-hover:text-gray-200 transition">Show me a code snippet</div>
                            <div class="text-sm text-gray-400 font-medium line-clamp-2">of a website's sticky header</div>
                          </div>
                          <div class="w-full flex justify-between">
                            <div class="text-xs text-gray-500 group-hover:text-gray-400 transition self-center">Prompt</div>
                            <div class="self-end p-1 rounded-lg text-gray-400 group-hover:text-gray-200 transition">
                              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="size-4">
                                <path fill-rule="evenodd" d="M8 14a.75.75 0 0 1-.75-.75V4.56L4.03 7.78a.75.75 0 0 1-1.06-1.06l4.5-4.5a.75.75 0 0 1 1.06 0l4.5 4.5a.75.75 0 0 1-1.06 1.06L8.75 4.56v8.69A.75.75 0 0 1 8 14Z" clip-rule="evenodd"></path>
                              </svg>
                            </div>
                          </div>
                        </button>
                      </div>
                    </div>
                  </div>
                  
                      
                      
                      
                      
                </div>



                <div class="input w-full text-center my-20 ">
                    <input type="text" id="questionInput" class="text w-[55%] p-4 bg-gray-800 rounded-md " placeholder="  Send a Message">
                    <button id="sendButton" class=" relative -left-16 top-2 py-14 ">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="none" viewBox="0 0 32 32" class="icon-2xl"><path fill="currentColor" fill-rule="evenodd" d="M15.192 8.906a1.143 1.143 0 0 1 1.616 0l5.143 5.143a1.143 1.143 0 0 1-1.616 1.616l-3.192-3.192v9.813a1.143 1.143 0 0 1-2.286 0v-9.813l-3.192 3.192a1.143 1.143 0 1 1-1.616-1.616z" clip-rule="evenodd"></path></svg>
                    </button>
                    <div class="text-xs text-opacity-65 ">
                        AI an make mistakes. Check important info.
                    </div>
                </div>
                

            </div>


        <div class="right2 w-10/12   h-fit">
          <div class="box flex justify-end">
          <div class="box1  p-3 my-7 space-x-5 flex justify-start  bg-gray-700 rounded-xl w-[40vw]">
                
             <div id="question"></div>
          </div></div>
    
          <div class="box2  px-24 py-2  ml-2  space-x-5 flex justify-start items-center   rounded-xl w-full">
                
            <div id="solution">
              
            </div>
          </div>
          <div class="input w-full text-center scroll mt-80 ">
            <input type="text" class="text w-[55%] p-4 bg-gray-800 rounded-md " placeholder="  Send a Message">
            <button  class="relative -left-16 top-2 py-14 ">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="none" viewBox="0 0 32 32" class="icon-2xl"><path fill="currentColor" fill-rule="evenodd" d="M15.192 8.906a1.143 1.143 0 0 1 1.616 0l5.143 5.143a1.143 1.143 0 0 1-1.616 1.616l-3.192-3.192v9.813a1.143 1.143 0 0 1-2.286 0v-9.813l-3.192 3.192a1.143 1.143 0 1 1-1.616-1.616z" clip-rule="evenodd"></path></svg>
            </button>
            <div class="text-xs text-opacity-65 ">
                AI an make mistakes. Check important info.
            </div>
        </div>
        </div>


        
              
              


                  
        </div>
    </div>
    <script src="/static//js/script.js"></script>
</body>
</html>
